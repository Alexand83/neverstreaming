<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%96%B6</text></svg>">
  <title>Studio - Live Studio</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/studio.css">
</head>
<body class="studio-page">
  <header class="studio-header">
    <div class="studio-header-left">
      <span class="studio-logo">Live Studio</span>
      <span class="room-badge" id="room-badge">—</span>
      <span class="connection-status" id="connection-status">Connecting…</span>
    </div>
    <div class="studio-header-right">
      <button id="btn-scenes" class="btn btn-ghost" title="Scenes">Scenes</button>
      <button id="btn-layouts" class="btn btn-ghost" title="Layouts">Layouts</button>
      <button id="btn-end-call" class="btn btn-danger">End session</button>
    </div>
  </header>

  <div class="studio-body">
    <!-- Main area: Program (top) + Backstage strip (bottom) -->
    <section class="stage-section">
      <div class="guest-waiting-banner hidden" id="guest-waiting-banner">
        <span class="guest-waiting-icon">⏳</span>
        <p>In attesa: l'host ti inserirà nella chiamata quando è pronto.</p>
      </div>
      <div class="stage-label">In diretta / Programma</div>
      <div class="stage-canvas" id="stage-canvas">
        <div class="video-grid" id="video-grid" data-layout="1">
          <!-- Video slots filled by JS -->
        </div>
        <div class="screen-share-overlay hidden" id="screen-share-overlay">
          <video id="screen-share-video" autoplay playsinline></video>
          <span class="screen-share-label">Screen share</span>
        </div>
      </div>
      <div class="backstage-strip-label">Backstage — in attesa</div>
      <div class="backstage-strip" id="backstage-strip">
        <!-- Backstage cams in live, filled by JS -->
      </div>
    </section>

    <!-- Regia (solo host) | Chat | Layout -->
    <aside class="studio-panels" id="studio-panels">
      <div class="panel-tabs" id="panel-tabs">
        <button class="panel-tab host-only" data-panel="backstage">Regia</button>
        <button class="panel-tab" data-panel="chat">Chat</button>
        <button class="panel-tab host-only" data-panel="layout">Layout</button>
      </div>
      <div class="panel-content" id="panel-content">
        <div class="panel active" id="panel-backstage">
          <div class="backstage-list" id="backstage-list"></div>
        </div>
        <div class="panel" id="panel-chat">
          <div class="chat-container" id="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-row">
              <input type="text" id="chat-input" placeholder="Scrivi un messaggio…">
              <button id="btn-send-chat" class="btn btn-small">Invia</button>
            </div>
          </div>
        </div>
        <div class="panel" id="panel-layout">
          <div class="layout-tools" id="layout-tools">
            <h4>Layout</h4>
            <div class="layout-presets" id="layout-presets"></div>
            <h4>Scenes</h4>
            <div class="scene-buttons" id="scene-buttons"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Settings sidebar (slide-out) -->
    <aside class="settings-sidebar hidden" id="settings-sidebar">
      <div class="settings-sidebar-header">
        <h3>Impostazioni</h3>
        <button type="button" class="settings-close" id="settings-close" aria-label="Chiudi">×</button>
      </div>
      <div class="settings-categories">
        <section class="settings-category">
          <h4>Nickname</h4>
          <input type="text" id="settings-nickname" placeholder="Il tuo nome" maxlength="32">
        </section>
        <section class="settings-category">
          <h4>Cam e video</h4>
          <label>Webcam</label>
          <select id="settings-camera"></select>
          <label>Microfono</label>
          <select id="settings-microphone"></select>
          <label>Sfondo</label>
          <select id="vb-select-sidebar">
            <option value="none">Nessuno</option>
            <option value="blur">Sfocato</option>
            <option value="image">Immagine…</option>
          </select>
          <input type="file" id="vb-file-sidebar" accept="image/*" class="hidden">
          <p class="settings-hint">Usa cuffie per ridurre l’eco.</p>
        </section>
        <section class="settings-category">
          <h4>Aspetto</h4>
          <p class="settings-hint">Altre opzioni in arrivo.</p>
        </section>
      </div>
      <button type="button" id="settings-apply" class="btn btn-primary settings-apply-btn">Applica</button>
    </aside>
  </div>

  <!-- Local controls + nickname (clickable) -->
  <footer class="studio-footer">
    <div class="local-controls">
      <button id="btn-toggle-cam" class="control-btn" title="Camera">📷</button>
      <button id="btn-toggle-mic" class="control-btn" title="Microfono">🎤</button>
      <button id="btn-screen-share" class="control-btn" title="Condividi schermo">🖥️</button>
      <button id="btn-record" class="control-btn host-only" title="Registra">⏺</button>
      <button id="btn-settings" class="control-btn" title="Impostazioni">⚙️</button>
    </div>
    <div class="footer-nickname" id="footer-nickname" title="Clicca per modificare">
      <span class="footer-nickname-label">Tu:</span>
      <span class="footer-nickname-value" id="footer-nickname-value">—</span>
    </div>
    <div class="quality-indicator" id="quality-indicator">—</div>
  </footer>

  <!-- Scenes dropdown -->
  <div class="dropdown hidden" id="scenes-dropdown">
    <div class="scene-options" id="scene-options"></div>
  </div>

  <script src="../firebase/config.js"></script>
  <script type="module" src="../js/firebase.js"></script>
  <script type="module" src="../js/webrtc.js"></script>
  <script type="module" src="../js/participants.js"></script>
  <script type="module" src="../js/chat.js"></script>
  <script type="module" src="../js/screen-share.js"></script>
  <script type="module" src="../js/drag-layout.js"></script>
  <script type="module" src="../js/recording.js"></script>
  <script type="module" src="../js/virtual-background.js"></script>
  <script type="module" src="../js/studio-controller.js"></script>
</body>
</html>
