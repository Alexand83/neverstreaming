<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://Alexand83.github.io/neverstreaming/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Room - Live Studio</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body class="join-page">
  <header class="join-header">
    <a href="index.html" class="back-link">← Back</a>
    <h1>Join as Guest</h1>
  </header>

  <main class="join-main">
    <section class="join-form-section">
      <div class="join-card">
        <h2>Enter room link or ID</h2>
        <div class="input-group">
          <input type="text" id="room-id-input" placeholder="Paste link or room ID (e.g. 84XKS9)">
          <button id="btn-continue" class="btn btn-primary">Continue</button>
        </div>
      </div>
    </section>

    <section class="device-setup-section hidden" id="device-setup-section">
      <div class="device-setup-card">
        <h2>Device setup</h2>
        <div class="device-options">
          <div class="device-row">
            <label>Camera</label>
            <select id="select-camera"></select>
          </div>
          <div class="device-row">
            <label>Microphone</label>
            <select id="select-microphone"></select>
          </div>
          <div class="device-row">
            <label>Display name</label>
            <input type="text" id="display-name" placeholder="Your name" maxlength="32">
          </div>
        </div>
        <div class="preview-area">
          <h3>Preview</h3>
          <div class="video-preview-container">
            <video id="preview-video" autoplay playsinline muted></video>
            <span class="preview-label">You</span>
          </div>
        </div>
        <button id="btn-join-backstage" class="btn btn-primary btn-lg">Join Backstage</button>
      </div>
    </section>
  </main>

  <script src="firebase/config.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/webrtc.js"></script>
</body>
</html>
